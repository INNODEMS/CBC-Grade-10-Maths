<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rotational Symmetry of Solids</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraph.css" />
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.js"></script>
</head>
<body>

<div id="jsxgraph-rotation-symmetry"
    class="jxgbox"
    style="width: 900px; height: 900px;">
</div>

<script>
/* Rotational Symmetry of a Square Prism (3D)
 *
 * A square prism (4×4 base, height 2) has 8 rotational symmetries:
 *   – identity
 *   – 3 rotations about z  (90°, 180°, 270°)
 *   – 4 half-turns about horizontal axes
 *       (x-axis, y-axis, y = x diagonal, y = −x diagonal)
 *
 * Three sliders let the student rotate the solid in 90° steps about
 * the x-, y- and z-axes.  Of the 64 slider combinations, exactly 8
 * map the prism onto itself.  A tracker counts each new symmetry
 * discovered.
 */
(function () {
    'use strict';

    /* ==============================================================
     * Board
     * ============================================================== */
    var board = JXG.JSXGraph.initBoard('jsxgraph-rotation-symmetry', {
        boundingbox: [-10, 10, 10, -10],
        keepaspectratio: true,
        axis: false,
        showcopyright: false,
        shownavigation: false,
        movetarget: null,
        pan: { enabled: false },
        browserpan: false,
        zoom: { enabled: false }
    });

    /* ==============================================================
     * 3D View
     * ============================================================== */
    var view = board.create('view3d',
        [[-7, -3], [14, 10],
         [[-7, 7], [-5, 5], [-5, 5]]],
        {
            projection: 'central',
            trackball: { enabled: false },
            depthOrder: { enabled: true },

            axesPosition: 'center',
            xAxis: { visible: true, strokeColor: '#cccccc', strokeWidth: 1 },
            yAxis: { visible: true, strokeColor: '#cccccc', strokeWidth: 1 },
            zAxis: { visible: true, strokeColor: '#cccccc', strokeWidth: 1 },

            xPlaneRear:  { visible: false, mesh3d: { visible: false } },
            yPlaneRear:  { visible: false, mesh3d: { visible: false } },
            zPlaneRear:  { visible: false, mesh3d: { visible: false } },
            xPlaneFront: { visible: false, mesh3d: { visible: false } },
            yPlaneFront: { visible: false, mesh3d: { visible: false } },
            zPlaneFront: { visible: false, mesh3d: { visible: false } },

            xPlaneRearYAxis: { visible: false }, xPlaneRearZAxis: { visible: false },
            yPlaneRearXAxis: { visible: false }, yPlaneRearZAxis: { visible: false },
            zPlaneRearXAxis: { visible: false }, zPlaneRearYAxis: { visible: false },
            xPlaneFrontYAxis: { visible: false }, xPlaneFrontZAxis: { visible: false },
            yPlaneFrontXAxis: { visible: false }, yPlaneFrontZAxis: { visible: false },
            zPlaneFrontXAxis: { visible: false }, zPlaneFrontYAxis: { visible: false },

            az:   { slider: { visible: false } },
            el:   { slider: { visible: false } },
            bank: { slider: { visible: false } }
        }
    );
    view.setView(0.8, 0.3, 0);

    /* ==============================================================
     * Title
     * ============================================================== */
    board.create('text', [0, 8.5,
        'Rotate the square prism to find its symmetries'], {
        fontSize: 18, fixed: true, anchorX: 'middle'
    });

    /* ==============================================================
     * Rotation sliders  (snap at 90° = π/2)
     * ============================================================== */
    var sliderBase = {
        baseline: {
            highlight: false, strokeWidth: 10,
            lineCap: 'round', strokeColor: '#eeeeee'
        },
        highline: {
            highlight: false, strokeWidth: 10,
            lineCap: 'round', strokeColor: '#dddddd'
        },
        point1: { frozen: false, fixed: true },
        point2: { frozen: false, fixed: true },
        drawLabel: false,
        face: 'o',
        size: 8,
        strokeWidth: 0,
        highlightStrokeWidth: 4,
        ticks: { visible: false },
        visible: true
    };

    var tx = board.create('slider',
        [[-8.5, -7], [-4.5, -7], [0, 0, 1.5 * Math.PI]],
        Object.assign({}, sliderBase, {
            fillColor: '#e74c3c',
            highlightFillColor: '#c0392b',
            highlightStrokeColor: '#c0392b'
        })
    );
    var ty = board.create('slider',
        [[-2, -7], [2, -7], [0, 0, 1.5 * Math.PI]],
        Object.assign({}, sliderBase, {
            fillColor: '#27ae60',
            highlightFillColor: '#1e8449',
            highlightStrokeColor: '#1e8449'
        })
    );
    var tz = board.create('slider',
        [[4.5, -7], [8.5, -7], [0, 0, 1.5 * Math.PI]],
        Object.assign({}, sliderBase, {
            fillColor: '#2980b9',
            highlightFillColor: '#1f6f97',
            highlightStrokeColor: '#1f6f97'
        })
    );

    // Labels above sliders
    board.create('text', [-6.5, -6, 'Rotate X'], {
        fontSize: 13, fixed: true, anchorX: 'middle', strokeColor: '#e74c3c'
    });
    board.create('text', [0, -6, 'Rotate Y'], {
        fontSize: 13, fixed: true, anchorX: 'middle', strokeColor: '#27ae60'
    });
    board.create('text', [6.5, -6, 'Rotate Z'], {
        fontSize: 13, fixed: true, anchorX: 'middle', strokeColor: '#2980b9'
    });

    // Degree read-outs below sliders
    board.create('text', [-6.5, -8.2, function () {
        return Math.round(tx.Value() * 180 / Math.PI) % 360 + '\u00B0';
    }], { fontSize: 14, fixed: true, anchorX: 'middle', strokeColor: '#e74c3c' });

    board.create('text', [0, -8.2, function () {
        return Math.round(ty.Value() * 180 / Math.PI) % 360 + '\u00B0';
    }], { fontSize: 14, fixed: true, anchorX: 'middle', strokeColor: '#27ae60' });

    board.create('text', [6.5, -8.2, function () {
        return Math.round(tz.Value() * 180 / Math.PI) % 360 + '\u00B0';
    }], { fontSize: 14, fixed: true, anchorX: 'middle', strokeColor: '#2980b9' });

    /* ==============================================================
     * Square-prism geometry  (base 4×4, height 2)
     *
     *  Vertices:  (±2, ±2, ±1)
     *  6 faces, each a different colour.
     * ============================================================== */
    var a = 2, c = 1;
    var verts = [
        [-a, -a, -c], [ a, -a, -c], [ a,  a, -c], [-a,  a, -c],
        [-a, -a,  c], [ a, -a,  c], [ a,  a,  c], [-a,  a,  c]
    ];
    var faces = [
        [0, 1, 2, 3],   // bottom  (z = −1)
        [4, 5, 6, 7],   // top     (z = +1)
        [0, 1, 5, 4],   // front   (y = −2)
        [2, 3, 7, 6],   // back    (y = +2)
        [1, 2, 6, 5],   // right   (x = +2)
        [0, 3, 7, 4]    // left    (x = −2)
    ];
    var faceColors = [
        '#0072b2',   // blue   – bottom
        '#e69f00',   // orange – top
        '#f0e442',   // yellow – front
        '#009e73',   // green  – back
        '#56b4e9',   // sky    – right
        '#d55e00'    // red    – left
    ];

    /* Reference prism  (fixed, opaque, left side) */
    var xOff = 3;
    var refVerts = verts.map(function (v) {
        return [v[0] - xOff, v[1], v[2]];
    });
    var refPrism = view.create('polyhedron3d', [refVerts, faces], {
        fillColorArray: faceColors,
        fillOpacity: 0.8,
        strokeColor: '#333333',
        strokeWidth: 1.5
    });

    /* Transforms for the rotating prism:
       1. Translate from reference position to origin  (+xOff)
       2. Apply slider-driven rotations about origin
       3. Translate to the right-hand position         (+xOff) */
    var trToOrigin = view.create('transform3d',
        [xOff, 0, 0], { type: 'translate' });
    var trX = view.create('transform3d',
        [function () { return tx.Value(); }], { type: 'rotateX' });
    var trY = view.create('transform3d',
        [function () { return ty.Value(); }], { type: 'rotateY' });
    var trZ = view.create('transform3d',
        [function () { return tz.Value(); }], { type: 'rotateZ' });
    var trToRight = view.create('transform3d',
        [xOff, 0, 0], { type: 'translate' });

    /* Movable prism  (copy of reference, rotated, placed on right) */
    view.create('polyhedron3d',
        [refPrism, [trToOrigin, trX, trY, trZ, trToRight]], {
        fillColorArray: faceColors,
        fillOpacity: 0.85,
        strokeColor: 'black',
        strokeWidth: 2
    });

    /* ==============================================================
     * Symmetry detection
     * ============================================================== */
    var totalSym = 8;
    var symCount = 0;
    var seenSym  = {};
    var allFound = false;

    /* Check / cross icon */
    var checkmark = board.create('text', [0, -3.8, '\u2716'], {
        fontSize: 36,
        strokeColor: '#c0392b', fillColor: '#c0392b',
        fixed: true, anchorX: 'middle', anchorY: 'middle'
    });

    /* Status message (shown only on a match) */
    var statusLabel = board.create('text', [0, -4.5, ''], {
        fontSize: 15, fixed: true, anchorX: 'middle',
        strokeColor: '#0a8f2c'
    });

    /* Running counter */
    var counterText = board.create('text',
        [0, -5.2, 'Symmetries found: 0 / ' + totalSym], {
        fontSize: 16, fixed: true, anchorX: 'middle'
    });

    /* ----------------------------------------------------------
     * Rotation-matrix algebra
     *
     * Transforms are applied X → Y → Z, so the combined matrix
     * is  M = Rz · Ry · Rx.
     * ---------------------------------------------------------- */
    function rotMat(ax, ay, az) {
        var cx = Math.cos(ax), sx = Math.sin(ax),
            cy = Math.cos(ay), sy = Math.sin(ay),
            cz = Math.cos(az), sz = Math.sin(az);
        return [
            [cy * cz, sx * sy * cz - cx * sz, cx * sy * cz + sx * sz],
            [cy * sz, sx * sy * sz + cx * cz, cx * sy * sz - sx * cz],
            [-sy,     sx * cy,                 cx * cy                ]
        ];
    }

    function mulMV(M, v) {
        return [
            M[0][0] * v[0] + M[0][1] * v[1] + M[0][2] * v[2],
            M[1][0] * v[0] + M[1][1] * v[1] + M[1][2] * v[2],
            M[2][0] * v[0] + M[2][1] * v[1] + M[2][2] * v[2]
        ];
    }

    /* Snap a slider value to the nearest multiple of π/2 */
    function snapAngle(v) {
        return Math.round(v / (Math.PI / 2)) * (Math.PI / 2);
    }

    /* Distance-squared between two 3-vectors */
    function dist2(a, b) {
        var dx = a[0] - b[0], dy = a[1] - b[1], dz = a[2] - b[2];
        return dx * dx + dy * dy + dz * dz;
    }

    /* Does the rotated vertex match any original vertex? */
    var TOL2 = 0.001 * 0.001;          // squared tolerance
    function vertexMatches(rv) {
        return verts.some(function (ov) {
            return dist2(rv, ov) < TOL2;
        });
    }

    /* ----------------------------------------------------------
     * Main check loop  (called on board update & periodically)
     * ---------------------------------------------------------- */
    function checkSymmetry() {
        var ax = snapAngle(tx.Value()),
            ay = snapAngle(ty.Value()),
            az = snapAngle(tz.Value());
        var M = rotMat(ax, ay, az);

        /* Does M map every vertex to another vertex of the prism? */
        var matched = verts.every(function (v) {
            return vertexMatches(mulMV(M, v));
        });

        if (matched) {
            /* Green tick */
            checkmark.setText('\u2714');
            checkmark.setAttribute({
                strokeColor: '#0a8f2c', fillColor: '#0a8f2c'
            });

            /* Identify rotation uniquely by its action on two basis
               vectors (two columns of M suffice). */
            var r = function (x) { return Math.round(x); };
            var k = mulMV(M, [1, 0, 0]).map(r).join(',') + '|' +
                    mulMV(M, [0, 1, 0]).map(r).join(',');

            if (!seenSym[k]) {
                seenSym[k] = true;
                symCount++;
                counterText.setText(
                    'Symmetries found: ' + symCount + ' / ' + totalSym);
            }

            if (symCount >= totalSym && !allFound) {
                allFound = true;
            }
            statusLabel.setText(allFound
                ? 'All ' + totalSym + ' symmetries found! \uD83C\uDF89'
                : 'Rotational symmetry!');
        } else {
            /* Red cross */
            checkmark.setText('\u2716');
            checkmark.setAttribute({
                strokeColor: '#c0392b', fillColor: '#c0392b'
            });
            if (!allFound) {
                statusLabel.setText('');
            }
        }
    }

    setInterval(checkSymmetry, 150);
    board.on('update', checkSymmetry);

})();
</script>

</body>
</html>
