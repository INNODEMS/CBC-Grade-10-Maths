<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"/>
    <title>Congruence Triangles (JSXGraph Demo)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.4.0/jsxgraph.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.4.0/jsxgraphcore.js"></script>
</head>
<body>
    <!-- Based on jsxgraph-template.html  [oai_citation:0‡jsxgraph-template.html](sediment://file_00000000357c71fdae9f962dd120a7ae) -->
    <div id="jsxgraph-congruence-triangles" class="jxgbox" style="width: 900px; height: 675px; border: 1px solid #ccc;"></div>

    <script>
/* congruence-triangles.js
   Congruence via rigid motions: translate + rotate triangles.
*/

(function () {
    'use strict';

    // -----------------------------
    // Board setup
    // -----------------------------
    var board = JXG.JSXGraph.initBoard('jsxgraph-congruence-triangles', {
        boundingbox: [-6, 6, 6, -6],
        keepAspectRatio: true,
        axis: false,
        grid: false,
        showCopyright: false,
        showNavigation: false
    });

    // -----------------------------
    // Utility helpers
    // -----------------------------
    function rotX(x, y, theta) {
        return x * Math.cos(theta) - y * Math.sin(theta);
    }

    function rotY(x, y, theta) {
        return x * Math.sin(theta) + y * Math.cos(theta);
    }

    function angleFromPoints(P, H) {
        return Math.atan2(H.Y() - P.Y(), H.X() - P.X());
    }

    /**
     * Create a "movable by rigid motion" triangle defined by local coordinates.
     * The triangle is translated by draggable anchor P and rotated by dragging a handle H on a circle.
     *
     * localVerts: [{x:..., y:...}, ...] in counterclockwise order
     */
    function createRigidTriangle(options) {
        var localVerts = options.localVerts;
        var anchor = options.anchor; // [x,y]
        var handleAngle = options.handleAngle || 0;
        var handleRadius = options.handleRadius || 2.0;

        var fillColor = options.fillColor || '#2a6fdb';
        var strokeColor = options.strokeColor || '#1f4fa3';
        var label = options.label || '';

        // We'll use a central control point M (centroid) to translate the triangle,
        // and rotate the triangle about A' using a handle H placed above A'.
        var localA = localVerts[0];
        var centroid = localVerts.reduce(function (s, v) { return { x: s.x + v.x, y: s.y + v.y }; }, { x: 0, y: 0 });
        centroid.x /= localVerts.length;
        centroid.y /= localVerts.length;
        var relCentroid = { x: centroid.x - localA.x, y: centroid.y - localA.y };

        // Numeric theta (angle) state
        var _theta = handleAngle;

        // Interpret `anchor` as the initial A' position. Compute initial center M so centroid sits at M.
        var Mx0 = anchor[0] + rotX(relCentroid.x, relCentroid.y, _theta);
        var My0 = anchor[1] + rotY(relCentroid.x, relCentroid.y, _theta);

        var M = board.create('point', [Mx0, My0], {
            name: '',
            size: 8,
            face: 'circle',
            strokeColor: strokeColor,
            fillColor: strokeColor,
            withLabel: false
        });

        function computePfromM() {
            return [M.X() - rotX(relCentroid.x, relCentroid.y, _theta), M.Y() - rotY(relCentroid.x, relCentroid.y, _theta)];
        }

        var Pcoords = computePfromM();
        var P = board.create('point', Pcoords, { visible: false, withLabel: false });

        // No visible rotation circle or external handle. Rotation is initiated by dragging
        // any vertex; rotation occurs about the centroid M by updating _theta.

        function theta() { return _theta; }

        // When M moves, recompute P so centroid remains at M
        M.on('drag', function () {
            var newP = computePfromM();
            P.setPosition(JXG.COORDS_BY_USER, newP);
            board.update();
        });

        // Create the (visible) triangle vertices as function points computed from P and _theta
        var vertexNames = options.vertexNames || ['', '', ''];
        var pts = localVerts.map(function (v, idx) {
            return board.create('point', [
                function () {
                    var rx = rotX(v.x - localA.x, v.y - localA.y, _theta);
                    return P.X() + rx;
                },
                function () {
                    var ry = rotY(v.x - localA.x, v.y - localA.y, _theta);
                    return P.Y() + ry;
                }
            ], {
                name: vertexNames[idx] || '',
                visible: true,
                fixed: true,
                withLabel: true,
                size: 3
            });
        });

        // Polygon for the triangle
        var poly = board.create('polygon', pts, {
            fillColor: fillColor,
            fillOpacity: 0.25,
            strokeColor: strokeColor,
            strokeWidth: 2,
            vertices: { visible: false }
        });

        // Rotation by dragging any vertex: compute angle of mouse about M and update _theta.
        var rotating = false;
        var rotStartAng = 0;
        var rotStartTheta = 0;

        function angleMouseToM(evt) {
            var pos = board.getUsrCoordsOfMouse(evt);
            return Math.atan2(pos[1] - M.Y(), pos[0] - M.X());
        }

        // Use board-level mouse handlers to detect clicks near a vertex and rotate about M.
        board.on('down', function (evt) {
            var pos = board.getUsrCoordsOfMouse(evt);
            rotating = false;
            for (var i = 0; i < pts.length; i++) {
                var vx = pts[i].X();
                var vy = pts[i].Y();
                var dx = pos[0] - vx;
                var dy = pos[1] - vy;
                if (Math.sqrt(dx * dx + dy * dy) < 0.35) { // threshold in user units
                    rotating = true;
                    rotStartAng = Math.atan2(pos[1] - M.Y(), pos[0] - M.X());
                    rotStartTheta = _theta;
                    break;
                }
            }
        });

        board.on('move', function (evt) {
            if (!rotating) return;
            var pos = board.getUsrCoordsOfMouse(evt);
            var ang = Math.atan2(pos[1] - M.Y(), pos[0] - M.X());
            _theta = rotStartTheta + (ang - rotStartAng);
            var newP = computePfromM();
            P.setPosition(JXG.COORDS_BY_USER, newP);
            board.update();
        });

        board.on('up', function () {
            rotating = false;
        });

        // Translation is handled by the central control point `M` only.

        // Do not create extra text labels for anchor/handle; labels are the triangle vertex names only.

        return { P: P, pts: pts, poly: poly, M: M };
    }

    // -----------------------------
    // Fixed reference triangle (black)
    // -----------------------------
    // Choose a "nice" scalene triangle so congruence is visually meaningful.
    // Center the fixed (black) triangle at the board center by using the same
    // shape as `localCongruent` but shifted so its centroid is at (0,0).
    var fixedA = board.create('point', [-5/3, -3], { name: 'A', size: 3, fixed: true, strokeColor: '#000000', fillColor: '#000000' });
    var fixedB = board.create('point', [7/3, -3], { name: 'B', size: 3, fixed: true, strokeColor: '#000000', fillColor: '#000000' });
    var fixedC = board.create('point', [-2/3,  0], { name: 'C', size: 3, fixed: true, strokeColor: '#000000', fillColor: '#000000' });

    board.create('polygon', [fixedA, fixedB, fixedC], {
        fillColor: '#000000',
        fillOpacity: 0.06,
        strokeColor: '#000000',
        strokeWidth: 2
    });

    board.create('text', [0, 5.6,
        'Are the blue and red triangles congruent to the black triangle?'
    ], { fontSize: 24, fixed: true, anchorX: 'middle' });
    board.create('text', [0, 5, 'Try to translate (using the central dot) and rotate (using the vertices)'], { fontSize: 20, fixed: true, anchorX:'middle'});
    board.create('text', [0, 4.6, 'the blue and red triangle so they overlap with the black triangle.'], { fontSize: 20, fixed: true, anchorX:'middle'});


    // -----------------------------
    // Local coordinate models
    // -----------------------------
    // Local version of the fixed triangle, using A as origin.
    // fixedA = (-8,-1). Let local A0=(0,0), B0=(4,0), C0=(1,3).
    var localCongruent = [
        { x: 0, y: 0 },   // A
        { x: 4, y: 0 },   // B
        { x: 1, y: 3 }    // C
    ];

    // A non-congruent triangle (one vertex moved so side lengths differ)
    var localNonCongruent = [
        { x: 0, y: 0 },   // A
        { x: 4, y: 0 },   // B
        { x: 1, y: 3.7 }  // C (different length from base and other sides)
    ];

    // -----------------------------
    // Movable triangles
    // -----------------------------
    // Congruent (blue): same size/shape as fixed, but initially rotated/translated.
    var blueTri = createRigidTriangle({
        localVerts: localCongruent,
        anchor: [-2, 0],
        handleAngle: Math.PI / 2,
        handleRadius: 2.0,
        fillColor: '#2a6fdb',
        strokeColor: '#1f4fa3',
        label: 'Blue (congruent)',
        vertexNames: ["A'", "B'", "C'"]
    });

    // Not congruent (red): different shape.
    var redTri = createRigidTriangle({
        localVerts: localNonCongruent,
        anchor: [5, 0],
        handleAngle: Math.PI / 2,
        handleRadius: 2.0,
        fillColor: '#d64545',
        strokeColor: '#a83232',
        label: 'Red (not congruent)',
        vertexNames: ["A*", "B*", "C*"]
    });

    // Fixed points array for comparison
    var fixedPts = [fixedA, fixedB, fixedC];

    // Status indicators and labels
    var statusBlue = board.create('text', [-3, -5, '\u2716'], {
        fontSize: 44,
        strokeColor: '#c0392b',
        fillColor: '#c0392b',
        fixed: true,
        visible: true,
        anchorX: 'middle',
        anchorY: 'middle'
    });
    var statusBlueLabel = board.create('text', [-3, -4, 'Blue triangle matching with black'], { fontSize: 20, fixed: true, anchorX: 'middle' });
    var statusBlueCongruent = board.create('text', [-3, -5.7, 'Blue triangle is congruent to the black!'], { fontSize: 20, fixed: true, anchorX: 'middle', visible: false});

    var statusRed = board.create('text', [3, -5, '\u2716'], {
        fontSize: 44,
        strokeColor: '#c0392b',
        fillColor: '#c0392b',
        fixed: true,
        visible: true,
        anchorX: 'middle',
        anchorY: 'middle',
    });
    var statusRedLabel = board.create('text', [3, -4, 'Red triangle matching with black'], { fontSize: 20, fixed: true, anchorX: 'middle' });

    // Check function: compare triangle vertices to fixed triangle vertices for both blue and red
    function showCheckIfMatched() {
        var tol = 0.02; // stricter tolerance in user units

        // Blue triangle
        if (blueTri && blueTri.pts) {
            var maxdB = 0;
            for (var i = 0; i < 3; i++) {
                var bx = blueTri.pts[i].X();
                var by = blueTri.pts[i].Y();
                var fx = fixedPts[i].X();
                var fy = fixedPts[i].Y();
                var d = Math.sqrt((bx - fx) * (bx - fx) + (by - fy) * (by - fy));
                if (d > maxdB) maxdB = d;
            }
            if (maxdB <= tol) {
                statusBlue.setText('\u2714');
                statusBlue.setAttribute({ strokeColor: '#0a8f2c', fillColor: '#0a8f2c', visible: true });
                statusBlueCongruent.setAttribute({visible:true});
            } else {
                statusBlue.setText('\u2716');
                statusBlue.setAttribute({ strokeColor: '#c0392b', fillColor: '#c0392b', visible: true });
                statusBlueCongruent.setAttribute({visible:false});
            }
        }

        // Red triangle
        if (redTri && redTri.pts) {
            var maxdR = 0;
            for (var j = 0; j < 3; j++) {
                var rx = redTri.pts[j].X();
                var ry = redTri.pts[j].Y();
                var fx2 = fixedPts[j].X();
                var fy2 = fixedPts[j].Y();
                var dr = Math.sqrt((rx - fx2) * (rx - fx2) + (ry - fy2) * (ry - fy2));
                if (dr > maxdR) maxdR = dr;
            }
            if (maxdR <= tol) {
                statusRed.setText('\u2714');
                statusRed.setAttribute({ strokeColor: '#0a8f2c', fillColor: '#0a8f2c', visible: true });
            } else {
                statusRed.setText('\u2716');
                statusRed.setAttribute({ strokeColor: '#c0392b', fillColor: '#c0392b', visible: true });
            }
        }
    }

    // Periodically check (also call after board updates)
    setInterval(showCheckIfMatched, 150);
    board.on('update', showCheckIfMatched);

})();
    </script>
</body>
</html>
