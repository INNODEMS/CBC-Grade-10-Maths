<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSXGraph</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.4.0/jsxgraphcore.js"></script>
</head>
<body>
    <div id="jxgbox" class="jxgbox" style="width: 500px; height: 400px;"></div>
    <script>
        var board = JXG.JSXGraph.initBoard('jxgbox',{boundingbox:[-5,5,5,-5],keepAspectRatio:true});
        var p = board.create('point',[0,0],{name:"A",visible:false});
        var circle1 = board.create("circle",["A",3],{fillColor:"green",fillOpacity:0.3,strokeColor:"black"});
        var circle = board.create("circle",["A",2],{method:"pointRadius", fillColor:"white",fillOpacity:1,strokeColor:"black"});
        //var circle1 = board.create("circle",["A",3],{fillColor:"green"});
    </script>
</body>
</html>
